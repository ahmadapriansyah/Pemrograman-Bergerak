<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background: #007bff; /* Warna biru seperti desain aslimu */
            color: white;
        }
        h2 { color: #333; }
        .loading { font-style: italic; color: #888; text-align: center; }
    </style>
</head>
<body>

    <h2>Data Mahasiswa (Versi Supabase)</h2>
    <p>Aplikasi ini mengambil data langsung dari Supabase tanpa menggunakan PHP.</p>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jurusan</th>
            </tr>
        </thead>
        <tbody id="hasil">
            <tr><td colspan="4" class="loading">Sedang mengambil data dari database...</td></tr>
        </tbody>
    </table>

    <script>
        // 1. SETTING KONEKSI SUPABASE
        // Ganti URL di bawah ini dengan Project URL dari Supabase kamu
        // Contoh bentuknya: 'https://abcdefghijklmnopq.supabase.co'
        const SUPABASE_URL = 'https://psdwpdlwnxxxcqhgjnmw.supabase.co'; 
        
        // Ini adalah Kunci Publikasi yang sudah kamu berikan
        const SUPABASE_KEY = 'sb_publishable_nD4WmWYpgvhB_NkcGB4yNg_pTCAlvIa'; 

        // 2. FUNGSI MENGAMBIL DATA (PENGGANTI api_mahasiswa.php)
        async function ambilDataMahasiswa() {
            try {
                // Fetch API ini menggantikan fungsi SELECT * FROM mahasiswa
                const response = await fetch(`${SUPABASE_URL}/rest/v1/mahasiswa?select=*`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error("Gagal mengambil data dari Supabase");
                }

                const data = await response.json();
                let output = "";

                // 3. MENAMPILKAN DATA KE TABEL (PENGGANTI tampil.php)
                if (data.length === 0) {
                    output = "<tr><td colspan='4' style='text-align:center;'>Belum ada data di tabel mahasiswa.</td></tr>";
                } else {
                    data.forEach(item => {
                        output += `
                            <tr>
                                <td>${item.id}</td>
                                <td>${item.nama}</td>
                                <td>${item.nim}</td>
                                <td>${item.jurusan || '-'}</td>
                            </tr>
                        `;
                    });
                }

                // Masukkan hasil kodingan ke dalam tabel HTML
                document.getElementById("hasil").innerHTML = output;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById("hasil").innerHTML = "<tr><td colspan='4' style='color:red; text-align:center;'>Error: Gagal koneksi ke database. Pastikan URL Supabase sudah benar.</td></tr>";
            }
        }

        // Jalankan fungsi saat web dibuka
        ambilDataMahasiswa();
    </script>

</body>
</html>
