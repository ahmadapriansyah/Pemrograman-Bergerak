<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #007bff;
            color: white;
        }

        h2 {
            color: #333;
        }
    </style>
</head>
<body>

<h2>Data Mahasiswa</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jurusan</th>
        </tr>
    </thead>
    <tbody id="hasil">
        <tr><td colspan="4" style="text-align: center; font-style: italic;">Memuat data...</td></tr>
    </tbody>
</table>

<script>
    // URL dan Key milikmu sudah dipasang di sini
    const SUPABASE_URL = 'https://psdwpdlwnxxxcqhgjnmw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_nD4WmWYpgvhB_NkcGB4yNg_pTCAlvIa'; 

    async function ambilDataMahasiswa() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/mahasiswa?select=*`, {
                method: 'GET',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error("Gagal mengambil data dari Supabase");
            }

            const data = await response.json();
            let output = "";

            if (data.length === 0) {
                output = "<tr><td colspan='4' style='text-align:center;'>Belum ada data di database.</td></tr>";
            } else {
                data.forEach(item => {
                    output += `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.nama}</td>
                            <td>${item.nim}</td>
                            <td>${item.jurusan || '-'}</td>
                        </tr>
                    `;
                });
            }

            document.getElementById("hasil").innerHTML = output;

        } catch (error) {
            console.error('Error:', error);
            document.getElementById("hasil").innerHTML = "<tr><td colspan='4' style='color:red; text-align:center;'>Error: Gagal koneksi ke database.</td></tr>";
        }
    }

    // Jalankan fungsi saat web dibuka
    ambilDataMahasiswa();
</script>

</body>
</html>
